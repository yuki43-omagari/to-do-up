<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ToDo List</title>
<link rel="manifest" href="manifest.json?v=20">

<meta name="theme-color" content="#ffffff">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">

<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    background: white;
    margin: 40px 20px;
}

h1 {
    margin-bottom: 20px;
}

.input-area {
    margin-bottom: 20px;
}

input[type="text"] {
    padding: 10px;
    width: 220px;
    font-size: 16px;
}

#addBtn {
    padding: 10px 20px;
    font-size: 16px;
    cursor: pointer;
}

ul {
    list-style: none;
    padding: 0;
    max-width: 500px;
    margin: 0 auto;
}

li {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin: 10px 0;
    font-size: 18px;
}

.delete-btn {
    width: 30px;
    height: 30px;
    cursor: pointer;
}

.bottom-buttons {
    margin-top: 30px;
    display: flex;
    justify-content: center;
    gap: 20px;
}

.action-btn {
    width: 120px;
    height: 80px;
    font-size: 20px;
    border: 2px solid black;
    background: white;
    cursor: pointer;
}

.action-btn:hover {
    background: #f0f0f0;
}

.timer-area {
    margin-top: 60px;
}

#timeSelect {
    padding: 8px;
    font-size: 18px;
}

#timer {
    font-size: 50px;
    margin: 20px 0;
}

.timer-btn {
    padding: 10px 20px;
    font-size: 16px;
    margin: 0 5px;
    cursor: pointer;
}
</style>
</head>

<body>

<h1>ToDo List</h1>

<div class="input-area">
    <input type="text" id="taskInput" placeholder="タスクを入力">
    <button id="addBtn" onclick="addTask()">Add</button>
</div>

<ul id="taskList"></ul>

<div class="bottom-buttons">
    <button class="action-btn" onclick="openSM()">SM</button>
    <button class="action-btn" onclick="openVictory()">Victory</button>
    <button class="action-btn" onclick="openDefeat()">Defeat</button>
</div>

<div class="timer-area">

    <select id="timeSelect" onchange="changeTime()">
        <option value="1500">25分</option>
        <option value="900">15分</option>
        <option value="300">5分</option>
    </select>

    <h2 id="timer">25:00</h2>

    <button class="timer-btn" onclick="startTimer()">スタート</button>
    <button class="timer-btn" onclick="stopTimer()">停止</button>
    <button class="timer-btn" onclick="resetTimer()">リセット</button>

</div>

<script>

// ---------- ToDo ----------

window.onload = function() {
    loadTasks();
    loadTimer();
};

function addTask() {
    const input = document.getElementById("taskInput");
    const text = input.value.trim();

    if (text === "") return;

    createTaskElement(text);
    input.value = "";
    saveTasks();
}

function createTaskElement(text) {
    const li = document.createElement("li");

    li.innerHTML = `
        <input type="checkbox">
        <span>${text}</span>
        <button class="delete-btn" onclick="deleteTask(this)">×</button>
    `;

    document.getElementById("taskList").appendChild(li);
}

function deleteTask(button) {
    button.parentElement.remove();
    saveTasks();
}

function saveTasks() {
    const tasks = [];

    document.querySelectorAll("#taskList span").forEach(span => {
        tasks.push(span.innerText);
    });

    localStorage.setItem(
        "myTodoList",
        JSON.stringify(tasks)
    );
}

function loadTasks() {
    const savedTasks =
        localStorage.getItem("myTodoList");

    if (savedTasks) {
        JSON.parse(savedTasks).forEach(task => {
            createTaskElement(task);
        });
    }
}

document.getElementById("taskInput")
.addEventListener("keypress", function(event) {
    if (event.key === "Enter") {
        addTask();
    }
});

// ---------- Links ----------

function openSM() {
    window.open("https://youtu.be/vc_UVpFayaw?si=7lncJ8hEqz3mV3TP");
}

function openVictory() {
    window.open("https://youtube.com/@ama_eru?si=Q1Qn4DBU5YxUoKJR");
}

function openDefeat() {
    window.open("https://youtu.be/L4J5pxu48v8?si=AAA1RqVGpoV7ps2O");
}

// ---------- Timer ----------

let time = 1500;
let timerInterval = null;

function saveTimer() {
    localStorage.setItem("timerTime", time);
    localStorage.setItem(
        "timerMode",
        document.getElementById("timeSelect").value
    );
}

function loadTimer() {

    const savedTime =
        localStorage.getItem("timerTime");

    const savedMode =
        localStorage.getItem("timerMode");

    if (savedMode) {
        document.getElementById("timeSelect").value =
            savedMode;
    }

    if (savedTime !== null) {
        time = parseInt(savedTime);
    }

    updateDisplay();
}

function updateDisplay() {

    const minutes =
        String(Math.floor(time / 60))
        .padStart(2, "0");

    const seconds =
        String(time % 60)
        .padStart(2, "0");

    document.getElementById("timer").innerText =
        `${minutes}:${seconds}`;
}

function changeTime() {

    stopTimer();

    time = parseInt(
        document.getElementById("timeSelect").value
    );

    updateDisplay();
    saveTimer();
}

function startTimer() {

    if (timerInterval) return;

    timerInterval = setInterval(() => {

        if (time > 0) {

            time--;
            updateDisplay();
            saveTimer();

        } else {

            clearInterval(timerInterval);
            timerInterval = null;

            alert("時間です！");
        }

    }, 1000);
}

function stopTimer() {

    clearInterval(timerInterval);
    timerInterval = null;
}

function resetTimer() {

    stopTimer();

    time = parseInt(
        document.getElementById("timeSelect").value
    );

    updateDisplay();
    saveTimer();
}

</script>

</body>
</html>
