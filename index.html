<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ToDo List</title>
  <link rel="manifest" href="manifest.json">

<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    background: white;
    margin: 40px 20px;
}

h1 {
    margin-bottom: 20px;
}

.input-area {
    margin-bottom: 20px;
}

input[type="text"] {
    padding: 10px;
    width: 220px;
    font-size: 16px;
}

#addBtn {
    padding: 10px 20px;
    font-size: 16px;
    cursor: pointer;
}

ul {
    list-style: none;
    padding: 0;
    max-width: 500px;
    margin: 0 auto;
}

li {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin: 10px 0;
    font-size: 18px;
}

.delete-btn {
    width: 30px;
    height: 30px;
    cursor: pointer;
}

.bottom-buttons {
    margin-top: 30px;
    display: flex;
    justify-content: center;
    gap: 20px;
}

.action-btn {
    width: 120px;
    height: 80px;
    font-size: 20px;
    border: 2px solid black;
    background: white;
    cursor: pointer;
}

.action-btn:hover {
    background: #f0f0f0;
}
</style>
</head>

<body>

<h1>ToDo List</h1>

<div class="input-area">
    <input type="text" id="taskInput" placeholder="タスクを入力">
    <button id="addBtn" onclick="addTask()">Add</button>
</div>

<ul id="taskList"></ul>

<div class="bottom-buttons">
    <button class="action-btn" onclick="openSM()">SM</button>
    <button class="action-btn" onclick="openVictory()">Victory</button>
    <button class="action-btn" onclick="openDefeat()">Defeat</button>
</div>

<script>
// 画面を開いたときに自動でタスクを読み込む
window.onload = function() {
    loadTasks();
};

function addTask() {
    const input = document.getElementById("taskInput");
    const text = input.value.trim();

    if (text === "") return;

    createTaskElement(text);
    input.value = "";
    
    // タスクを追加したら保存する
    saveTasks();
}

// 画面にタスクのHTMLを作る関数
function createTaskElement(text) {
    const li = document.createElement("li");

    li.innerHTML = `
        <input type="checkbox">
        <span>${text}</span>
        <button class="delete-btn" onclick="deleteTask(this)">×</button>
    `;

    document.getElementById("taskList").appendChild(li);
}

// タスクを削除する関数
function deleteTask(button) {
    button.parentElement.remove();
    // 削除したあと、最新の状態を保存する
    saveTasks();
}

// 現在のタスク一覧をスマホ（ブラウザ）に保存する関数
function saveTasks() {
    const taskList = document.getElementById("taskList");
    const tasks = [];
    
    // 画面上のすべてのタスクの文字を集める
    taskList.querySelectorAll("span").forEach(span => {
        tasks.push(span.innerText);
    });
    
    // localStorageに保存
    localStorage.setItem("myTodoList", JSON.stringify(tasks));
}

// 保存されたタスクを読み込んで画面に表示する関数
function loadTasks() {
    const savedTasks = localStorage.getItem("myTodoList");
    if (savedTasks) {
        const tasks = JSON.parse(savedTasks);
        tasks.forEach(text => {
            createTaskElement(text);
        });
    }
}

document.getElementById("taskInput").addEventListener("keypress", function(event) {
    if (event.key === "Enter") {
        addTask();
    }
});

function openSM() {
    window.open("https://youtu.be", "_blank");
}

function openVictory() {
    window.open("https://youtube.com", "_blank");
}

function openDefeat() {
    window.open("https://youtu.be", "_blank");
}
</script>

</body>
</html>
